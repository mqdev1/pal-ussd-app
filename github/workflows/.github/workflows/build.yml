name: Build Flutter Flet APK
on: [push, workflow_dispatch] # يعمل التجميع تلقائياً عند رفع الكود أو تشغيله يدوياً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب ملفات مشروعك داخل السيرفر السريع
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. إعداد جافا المطلوبة لنظام أندرويد
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تحميل وإعداد فلوتر النسخة 3 في أقل من 10 ثوانٍ!
      - name: Set up Flutter 3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # يقوم بجلب أحدث نسخة مستقرة من إصدارات Flutter 3

      # 4. تثبيت لغة بايثون و Flet للتجميع
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Flet CLI
        run: |
          pip install flet

      # 5. أمر بناء وتوليد ملف APK الافتراضي والسريع عبر Flet
      - name: Build Android APK
        run: |
          flet build apk --release

      # 6. رفع ملف الـ APK الناتج لتقوم بتحميله فوراً
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: PalUSSD-App-Digital
          path: build/apk/*.apk
