name: Build Flet APK and Upload to Dropbox

# تحديد الأحداث التي تطلق هذا المسار تلقائياً
on:
  push:
    branches: [ "main" ] # سيعمل تلقائياً عند عمل Push لفرع main
  workflow_dispatch: # يتيح لك تشغيل المسار يدوياً بضغطة زر من موقع GitHub

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب كود المشروع من المستودع (Repository)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. خطوة أمان للتأكد من وجود الـ Secret الخاص بـ Dropbox لتفادي فشل الرفع الصامت
    - name: Check Secret Presence
      run: |
        if [ -z "${{ secrets.DROPBOX_ACCESS_TOKEN }}" ]; then
          echo "::error::الرمز السري DROPBOX_ACCESS_TOKEN غير موجود في إعدادات جيت هاب! يرجى إضافته في Repository Secrets."
          exit 1
        fi

    # 3. إعداد لغة بايثون (Python) بالإصدار الحديث المطابق لجهازك
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # 4. تثبيت مكتبة Flet الحديثة وترقية أداة pip لإدارة الحزم
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython
        pip install flet==0.85.3 pyjnius==1.6.1

    # 5. تثبيت جافا (Java JDK 17) المطلوبة والأساسية لبناء حزم الأندرويد
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 6. تشغيل أمر بناء تطبيق الأندرويد بالأسلوب الحديث لنسخة 0.85.3
    # (قمنا بحذف كلمة src لأن الملفات أصبحت في الجذر الرئيسي)
    - name: Build Android APK
      run: |
        yes | flet build apk --verbose

    # 7. البحث عن ملف الـ APK الناتج وتجهيزه وتسميته للرفع
    - name: Locate and Prepare APK
      run: |
        APK_PATH=$(find build/ -name "*.apk" | head -n 1)
        
        if [ -z "$APK_PATH" ]; then
          echo "::error::لم يتم العثور على ملف الـ APK الناتج عن البناء!"
          exit 1
        fi
        
        echo "تم العثور على الملف في المسار: $APK_PATH"
        cp "$APK_PATH" ./ussd_pal_app.apk
        echo "تم تجهيز الملف في المسار الرئيسي باسم ussd_pal_app.apk بنجاح."

    # 8. الرفع التلقائي المباشر لملف الـ APK إلى حسابك في Dropbox
        # 8. الرفع التلقائي المباشر لملف الـ APK إلى حسابك في Dropbox
    - name: Upload APK to Dropbox
      env:
        DBX_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
      run: |
        # تم تصحيح الرابط هنا بإضافة كلمة content في البداية لتتعرف عليه شبكة جيت هاب
        curl -X POST https://dropboxapi.com \
          --header "Authorization: Bearer $DBX_TOKEN" \
          --header "Dropbox-API-Arg: {\"path\": \"/ussd_pal_app.apk\",\"mode\": \"overwrite\",\"autorename\": true,\"mute\": false,\"strict_conflict\": false}" \
          --header "Content-Type: application/octet-stream" \
          --data-binary @ussd_pal_app.apk

