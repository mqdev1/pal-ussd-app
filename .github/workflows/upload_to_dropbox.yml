name: Build Flet APK and Upload to Dropbox

# تحديد الأحداث التي تطلق هذا المسار تلقائياً
on:
  push:
    branches: [ "main" ] # سيعمل تلقائياً عند عمل Push لفرع main
  workflow_dispatch: # يتيح لك تشغيل المسار يدوياً بضغطة زر من VS Code أو موقع GitHub

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب كود المشروع من المستودع (Repository)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. خطوة أمان للتأكد من وجود الـ Secret الخاص بـ Dropbox لتفادي فشل الرفع الصامت
    - name: Check Secret Presence
      run: |
        if [ -z "${{ secrets.DROPBOX_ACCESS_TOKEN }}" ]; then
          echo "::error::الرمز السري DROPBOX_ACCESS_TOKEN غير موجود في إعدادات جيت هاب! يرجى إضافته في Repository Secrets."
          exit 1
        fi

    # 3. إعداد لغة بايثون (Python) داخل السيرفر الافتراضي
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 4. تثبيت مكتبة Flet وترقية أداة pip لإدارة الحزم
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet
        # إذا كان تطبيقك يعتمد على مكتبات خارجية أخرى (مثل requests أو sqlfluff)،
        # يمكنك تفعيل السطر التالي بعد إنشاء ملف requirements.txt:
        # pip install -r requirements.txt

    # 5. تثبيت جافا (Java JDK 17) المطلوبة والأساسية لبناء حزم الأندرويد
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 6. تثبيت محرك فلاتر (Flutter) بالنسخة المطابقة لمتطلبات Flet تماماً
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.7' # قمنا بتغييرها هنا للنسخة المطلوبة لمنع السؤال التفاعلي
        channel: 'stable'

    # 7. تشغيل أمر بناء ملف الـ APK مع إضافة أداة الموافقة التلقائية لضمان عدم توقف البناء
    - name: Build Android APK
      run: |
        # استخدام "yes |" يقوم بالموافقة التلقائية على أي نافذة حوار تفاعلية تظهر أثناء البناء
        yes | flet build apk --output ussd_pal_app.apk

    # 8. الرفع التلقائي المباشر لملف الـ APK الناتج إلى حسابك في Dropbox
    - name: Upload APK to Dropbox
      env:
        DBX_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
      run: |
        # أداة curl ترسل ملف الـ APK الصافي مباشرة إلى سيرفرات Dropbox API بدون أقواس تسبب مشاكل في التفسير
        curl -X POST https://content.dropboxapi.com/2/files/upload \
          --header "Authorization: Bearer $DBX_TOKEN" \
          --header "Dropbox-API-Arg: {\"path\": \"/ussd_pal_app.apk\",\"mode\": \"overwrite\",\"autorename\": true,\"mute\": false,\"strict_conflict\": false}" \
          --header "Content-Type: application/octet-stream" \
          --data-binary @ussd_pal_app.apk
