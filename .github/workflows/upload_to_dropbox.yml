name: Upload Backup to Dropbox

# تحديد الأحداث التي تطلق هذا المسار
on:
  push:
    branches: [ "main" ] # سيعمل تلقائياً عند دفع الكود لفرع main
  workflow_dispatch: # يتيح لك تشغيل المسار يدوياً من واجهة GitHub أو VS Code

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب ملفات المشروع من المستودع
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. فحص أماني للتأكد من وجود الـ Secret قبل المتابعة لمنع الأخطاء المبهمة
    - name: Check Secret Presence
      run: |
        if [ -z "${{ secrets.DROPBOX_ACCESS_TOKEN }}" ]; then
          echo "::error::الرمز السري DROPBOX_ACCESS_TOKEN غير موجود في إعدادات جيت هاب! يرجى إضافته في Repository Secrets."
          exit 1
        fi

    # 3. إنشاء ملف تجريبي للرفع (قم بتعطيل أو استبدال هذه الخطوة بملف الـ APK الفعلي الخاص بك)
    - name: Create Dummy File for Testing
      run: |
        echo "هذا ملف تجريبي تم توليده تلقائياً من GitHub Actions" > build_output.txt

    # 4. رفع الملف إلى Dropbox باستخدام أداة curl بالرابط الصحيح والنظيف تماماً
    - name: Upload File to Dropbox
      env:
        DBX_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
      run: |
        curl -X POST https://content.dropboxapi.com/2/files/upload \
          --header "Authorization: Bearer $DBX_TOKEN" \
          --header "Dropbox-API-Arg: {\"path\": \"/github_backup.txt\",\"mode\": \"overwrite\",\"autorename\": true,\"mute\": false,\"strict_conflict\": false}" \
          --header "Content-Type: application/octet-stream" \
          --data-binary @build_output.txt
