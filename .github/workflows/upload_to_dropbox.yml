name: Build Flet APK and Upload to Dropbox

# تحديد الأحداث التي تطلق هذا المسار تلقائياً
on:
  push:
    branches: [ "main" ] # سيعمل تلقائياً عند عمل Push لفرع main
  workflow_dispatch: # يتيح لك تشغيل المسار يدوياً بضغطة زر من VS Code أو موقع GitHub

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب كود المشروع من المستودع (Repository)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. خطوة أمان للتأكد من وجود الـ Secret الخاص بـ Dropbox لتفادي فشل الرفع الصامت
    - name: Check Secret Presence
      run: |
        if [ -z "${{ secrets.DROPBOX_ACCESS_TOKEN }}" ]; then
          echo "::error::الرمز السري DROPBOX_ACCESS_TOKEN غير موجود في إعدادات جيت هاب! يرجى إضافته في Repository Secrets."
          exit 1
        fi

    # 3. إعداد لغة بايثون (Python) داخل السيرفر الافتراضي
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 4. تثبيت مكتبة Flet وترقية أداة pip لإدارة الحزم
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet
        # إذا كان تطبيقك يعتمد على مكتبات خارجية أخرى (مثل requests)،
        # يمكنك تفعيل السطر التالي بعد إنشاء ملف requirements.txt:
        # pip install -r requirements.txt

    # 5. تثبيت جافا (Java JDK 17) المطلوبة والأساسية لبناء حزم الأندرويد
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 6. تثبيت محرك فلاتر (Flutter) بالنسخة المطابقة لمتطلبات Flet تماماً
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.7' # قمنا بتغييرها هنا للنسخة المطلوبة لمنع السؤال التفاعلي
        channel: 'stable'

    # 7. تشغيل أمر بناء تطبيق الأندرويد
    - name: Build Android APK
      run: |
        # أمر البناء الافتراضي من فليت، سيقوم بحفظ الملفات في مجلد build/apk
        yes | flet build apk

    # 8. البحث عن ملف الـ APK الناتج وتجهيزه وتسميته للرفع
    - name: Locate and Prepare APK
      run: |
        # البحث عن أي ملف APK تم توليده في مجلد build
        APK_PATH=$(find build/ -name "*.apk" | head -n 1)
        
        if [ -z "$APK_PATH" ]; then
          echo "::error::لم يتم العثور على ملف الـ APK الناتج عن البناء!"
          exit 1
        fi
        
        echo "تم العثور على الملف في المسار: $APK_PATH"
        # نسخ الملف إلى المجلد الرئيسي وتسميته باسم ثابت للرفع
        cp "$APK_PATH" ./ussd_pal_app.apk
        echo "تم تجهيز الملف في المسار الرئيسي باسم ussd_pal_app.apk بنجاح."

    # 9. الرفع التلقائي المباشر لملف الـ APK الحقيقي بعد تجهيزه إلى حسابك في Dropbox
    - name: Upload APK to Dropbox
      env:
        DBX_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
      run: |
        # الآن سيرفع ملف ussd_pal_app.apk الحقيقي الذي قمنا بنسخه وتجهيزه في الخطوة السابقة
        curl -X POST https://content.dropboxapi.com/2/files/upload \
          --header "Authorization: Bearer $DBX_TOKEN" \
          --header "Dropbox-API-Arg: {\"path\": \"/ussd_pal_app.apk\",\"mode\": \"overwrite\",\"autorename\": true,\"mute\": false,\"strict_conflict\": false}" \
          --header "Content-Type: application/octet-stream" \
          --data-binary @ussd_pal_app.apk
