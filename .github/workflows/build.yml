name: Build and Release Flet APK

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK with Flet
    runs-on: ubuntu-latest
    permissions: 
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # تثبيت الحزم الأساسية لنظام التشغيل لضمان عدم توقف بناء Flutter/Flet
      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev libgcrypt20-dev pkg-config

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade flet==0.23.0
          pip install pyjnius>=1.5.0
          pip install buildozer>=1.4.0

      - name: Create flet.yaml Configuration
        run: |
          cat > flet.yaml << 'EOF'
          app:
            path: .
            title: "تطبيق USSD"
          
          android:
            package: "com.palpay.ussd"
            permissions:
              - android.permission.CALL_PHONE
              - android.permission.INTERNET
              - android.permission.ACCESS_NETWORK_STATE
            min_sdk_version: 21
            target_sdk_version: 34
          EOF

      - name: Clean Build Cache
        run: |
          flutter clean 2>/dev/null || true

      # تشغيل البناء وتوجيه المخرجات لملف سياقي لتجنب مشاكل الـ CLI التفاعلي
      - name: Build APK
        run: |
          flet build apk -v > build.log 2>&1 || true

      # رفع ملف السجلات دائماً لتتمكن من تشخيص أي خطأ برمجي داخلي في الكود الخاص بك
      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flet-build-log-${{ github.run_number }}
          path: build.log
          retention-days: 5

      # البحث الذكي عن الـ APK في كل المجلدات لأن مسار مخرجات Flet قد يختلف بحسب إصدار الأدوات الداخلي
      - name: Prepare APK Artifact
        id: prepare_apk
        run: |
          echo "=== Searching for Generated APK ==="
          APK_PATH=$(find . -type f -name "*.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ Error: APK file was not generated by Flet."
            echo "=== Last 100 lines of build.log ==="
            tail -n 100 build.log
            exit 1
          fi
          
          echo "✅ APK Found at: $APK_PATH"
          cp "$APK_PATH" ussd-jawwal.apk
          echo "FINAL_APK=ussd-jawwal.apk" >> $GITHUB_ENV
          echo "✅ APK reduction and environment mapping complete."

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ### تحديث جديد للتطبيق 🚀
            - تم بناء حزمة الـ APK تلقائياً عبر GitHub Actions.
            - الصلاحيات المضمنة: الاتصال، الإنترنت، وحالة الشبكة.
          files: ${{ env.FINAL_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
