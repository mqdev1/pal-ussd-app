name: Build Flet APK

on:
  pull_request:
  workflow_dispatch: 

jobs:
  build:
    name: Build APK with Flet
    runs-on: ubuntu-latest
    permissions: 
      contents: write 

    steps:
      - uses: actions/checkout@v4
    
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pyjnius

      # هذه الخطوة تضمن دمج pyjnius داخل الـ APK بدون استخدام علامات غير مدعومة
      - name: Create Requirements File for Flet Build
        run: |
          echo "flet" > requirements.txt
          echo "pyjnius" >> requirements.txt

      - name: Build APK
        # عدنا للأمر القياسي الصحيح الذي يقبله فليت
        run: flet build apk -v

      - name: Prepare APK for Upload
        run: |
          APK_PATH=$(find build/apk -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK file not found!"
            exit 1
          fi
          cp "$APK_PATH" ussd-jawwal.apk
          echo "FINAL_APK=ussd-jawwal.apk" >> $GITHUB_ENV

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: "تم إصلاح خطأ البناء وتضمين مكتبة pyjnius بنجاح داخل تطبيق ussd-jawwal.apk"
          files: ${{ env.FINAL_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
