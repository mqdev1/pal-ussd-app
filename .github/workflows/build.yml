name: Build Flutter Flet APK
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب ملفات مشروعك داخل السيرفر السريع
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. إعداد جافا المطلوبة لنظام أندرويد
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تحميل وإعداد فلوتر النسخة 3
      - name: Set up Flutter 3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      # 4. تثبيت لغة بايثون وتجهيز البيئة
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 5. التعديل الجذري: إنشاء ملف تهيئة flet برمجياً وتشغيل البناء المفصل
      - name: Build Android APK
        run: |
          sudo apt-get update
          sudo apt-get install -y libnetfilter-queue-dev libgl1-mesa-dev
          pip install --upgrade pip
          pip install flet
          
          # إنشاء ملف التكوين الافتراضي لـ flet لمنع الانهيار
          echo "app:" > flet.yaml
          echo "  main_module: main" >> flet.yaml
          
          # تشغيل البناء مع طباعة تفصيلية للأخطاء
          flet build apk --verbose

      # 6. الرفع الآمن للملف النهائي لتقوم بتحميله فوراً
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PalUSSD-App-Digital
          path: build/apk/*.apk
