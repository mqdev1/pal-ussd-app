name: Build and Release Flet APK

on:
  push:
    tags:
      - 'v*' # يشتغل البناء تلقائياً عند إضافة تاغ جديد مثل v1.0.0
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من موقع جيتهاب في أي وقت

jobs:
  build-and-release:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # إذن ضروري للسماح للسكربت بإنشاء الـ Release ورفع الملفات

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9' # تم تحديد إصدار بايثون 3.9
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      - name: Build Flet APK
        run: |
          # ملاحظة: تأكد من تغيير اسم التطبيق، واسم الحزمة، ومسار الأيقونة بما يناسبك
          flet build apk --project-name "USSDPal" --org "com.ussdpal" --icon "./assets/icon.png" --verbose

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v1.0.{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || format('Release v1.0.{0}', github.run_number) }}
          draft: false
          prerelease: false
          files: build/apk/*.apk # يبحث عن ملف الـ APK المكتمل ويرفعه فوراً للـ Release
