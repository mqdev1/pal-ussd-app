name: Build Flet APK

on:
  pull_request:
  workflow_dispatch: 

jobs:
  build:
    name: Build APK with Flet
    runs-on: ubuntu-latest
    permissions: 
      contents: write 

    steps:
      - uses: actions/checkout@v4
    
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # الخطوة السحرية المفقودة: تثبيت الـ Flutter SDK في بيئة جيت هاب
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # استخدام النسخة المستقرة الرسمية

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pyjnius

      # إنشاء ملف الإعدادات للتطبيق والصلاحيات المطلوبة للـ USSD
      - name: Ensure flet.yaml exists
        run: |
          echo "app:" > flet.yaml
          echo "  path: ." >> flet.yaml
          echo "android:" >> flet.yaml
          echo "  permissions:" >> flet.yaml
          echo "    - android.permission.CALL_PHONE" >> flet.yaml

      - name: Build APK
        run: flet build apk -v

      - name: Prepare APK for Upload
        run: |
          APK_PATH=$(find build/apk -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK file not found!"
            exit 1
          fi
          cp "$APK_PATH" ussd-jawwal.apk
          echo "FINAL_APK=ussd-jawwal.apk" >> $GITHUB_ENV

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: "تم دمج بيئة Flutter SDK بنجاح، وتوليد ملف APK مستقر وجاهز للتشغيل بدون تجمد."
          files: ${{ env.FINAL_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
