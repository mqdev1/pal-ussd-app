- name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion ninja-build libgtk-3-dev libblkid-dev liblzma-dev libgcrypt20-dev
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade flet==0.23.0
          pip install pyjnius>=1.5.0
          pip install buildozer>=1.4.0

      - name: Verify installations
        run: |
          echo "=== Python Version ==="
          python --version
          echo "=== Flet Version ==="
          python -c "import pkg_resources; print(f'Flet: {pkg_resources.get_distribution(\"flet\").version}')"
          echo "=== Java Version ==="
          java -version
          echo "=== Flutter Version ==="
          flutter --version

      - name: Create flet.yaml with proper configuration
        run: |
          cat > flet.yaml << 'EOF'
          app:
            path: .
            title: "تطبيق USSD"
          
          android:
            package: "com.palpay.ussd"
            permissions:
              - android.permission.CALL_PHONE
              - android.permission.INTERNET
              - android.permission.ACCESS_NETWORK_STATE
            min_sdk_version: 21
            target_sdk_version: 34
          EOF

      # خطوة إضافية لضمان تنظيف الكاش قبل البناء
      - name: Clean Flet/Flutter cache
        run: |
          flet pack --clean 2>/dev/null || true
          flutter clean 2>/dev/null || true

      - name: Build APK with verbose output
        run: |
          # أحياناً الـ yes | تتسبب في تعليق البناء أو كسر الـ CLI، نمرر الإدخال بشكل آمن
          flet build apk -v > build.log 2>&1 || true
          
      # فحص هل البناء تم فعلاً أم فشل
      - name: Verify Build Output
        run: |
          echo "=== Tail of Build Log ==="
          tail -n 50 build.log
