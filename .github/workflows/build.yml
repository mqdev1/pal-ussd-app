name: Build Flet APK

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK with Flet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
    
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Java JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build APK (with verbose output)
        run: flet build apk -v

      - name: List all files created
        run: find . -type f -name "*.apk" || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: .
          retention-days: 5
