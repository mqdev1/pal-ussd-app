name: Build Flutter Flet APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب ملفات مشروعك داخل السيرفر السريع
      - name: Checkout code
        uses: actions/checkout@v4 # تحديث للإصدار الجديد

      # 2. إعداد جافا المطلوبة لنظام أندرويد
      - name: Set up JDK 17
        uses: actions/setup-java@v4 # تحديث للإصدار الجديد
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تحميل وإعداد فلوتر النسخة 3 في أقل من 10 ثوانٍ!
      - name: Set up Flutter 3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      # 4. تثبيت لغة بايثون و Flet للتجميع
      - name: Set up Python
        uses: actions/setup-python@v5 # تحديث للإصدار الجديد
        with:
          python-version: '3.10'

      # 5. بناء وتوليد ملف APK الافتراضي والسريع عبر Flet
      - name: Build Android APK
        run: |
          pip install flet
          flet build apk --release

      # 6. الرفع باستخدام الإصدار الحديث والمستقر v4 لتخطي الخطأ
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # التعديل الحرج هنا لحل المشكلة
        with:
          name: PalUSSD-App-Digital
          path: build/apk/*.apk
