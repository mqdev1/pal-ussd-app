name: Build Flet APK with ShoSho Developer

on:
  pull_request:
  workflow_dispatch: 

jobs:
  build:
    name: Build APK with Flet
    runs-on: ubuntu-latest
    permissions: 
      contents: write 

    steps:
      - uses: actions/checkout@v4
     
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade flet
          pip install pyjnius

      - name: Create flet.yaml with proper configuration
        run: |
          cat > flet.yaml << 'EOF'
          app:
            path: .
            title: "تطبيق USSD"
          
          android:
            package: "com.palpay.ussd"
            permissions:
              - android.permission.CALL_PHONE
              - android.permission.INTERNET
              - android.permission.ACCESS_NETWORK_STATE
            min_sdk_version: 21
          EOF

      - name: Verify flet.yaml
        run: cat flet.yaml

      - name: Build APK
        run: yes | flet build apk -v

      - name: Prepare APK for Upload
        run: |
          APK_PATH=$(find build/apk -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK file not found!"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          cp "$APK_PATH" ussd-jawwal.apk
          ls -lh ussd-jawwal.apk
          echo "FINAL_APK=ussd-jawwal.apk" >> $GITHUB_ENV

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: "تطبيق USSD محسّن مع معالجة أخطاء وصلاحيات صحيحة"
          files: ${{ env.FINAL_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
