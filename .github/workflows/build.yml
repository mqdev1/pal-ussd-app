name: Build Flet APK

on:
  pull_request:
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من تبويب Actions

jobs:
  build:
    name: Build APK with Flet
    runs-on: ubuntu-latest
    permissions: # ضروري لمنح الأكشن صلاحية إنشاء الـ Release ورفع الملف
      contents: write 

    steps:
      - uses: actions/checkout@v4
    
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pyjnius # تثبيت flet و pyjnius لبيئة البناء

      - name: Build APK
        # استخدام --packages pyjnius لضمان تضمين المكتبة داخل الـ APK النهائي للاندرويد
        run: flet build apk --packages pyjnius -v

      - name: Prepare APK for Upload
        run: |
          # البحث عن ملف الـ APK وتغيير اسمه إلى ussd-jawwal.apk
          APK_PATH=$(find build/apk -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK file not found!"
            exit 1
          fi
          cp "$APK_PATH" ussd-jawwal.apk
          echo "FINAL_APK=ussd-jawwal.apk" >> $GITHUB_ENV

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: "تم بناء التطبيق بنجاح. ملف الـ APK المرفق يحتوي على مكتبة jnius المطلوبة."
          files: ${{ env.FINAL_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
