name: Build Flet APK

on:
  pull_request:
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من تبويب Actions

jobs:
  build:
    name: Build APK with Flet
    runs-on: ubuntu-latest
    permissions: # ضروري لمنح الأكشن صلاحية إنشاء الـ Release ورفع الملف
      contents: write 

    steps:
      - uses: actions/checkout@v4
    
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build APK
        run: flet build apk -v

      # خطوة تحديد مسار الملف وتعديل اسمه إلى ussd-jawwal.apk
      - name: Prepare APK for Upload
        run: |
          APK_PATH=$(find build/apk -name "*.apk" | head -n 1)
          cp "$APK_PATH" ussd-jawwal.apk
          echo "FINAL_APK=ussd-jawwal.apk" >> $GITHUB_ENV

      # رفع الملف مباشرة إلى الـ Releases لتحصل على رابط تحميل مباشر وغير مضغوط
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: ${{ env.FINAL_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
