name: Build Flet App (No Black Screen)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. إعداد الجافا 
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. إعداد Flutter 
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      # 4. إعداد بايثون
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 5. تثبيت حزمة Flet فقط (هي تتكفل بالباقي داخلياً)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.23.0

      # 6. بناء التطبيق مع تمرير البيئة الصحيحة
      - name: Build APK
        env:
          CC: gcc  
        run: |
          flet build apk --verbose

      # 7. رفع الملف الناتج (APK)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: USSD-App-Release
          path: build/apk/*.apk
